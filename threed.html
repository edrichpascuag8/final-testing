<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milvus | 3D Visualization & Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
   <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --card-bg: #111;
            --accent: #00d4ff;
            --text: #ffffff;
            --muted: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 10%;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo img { height: 35px; cursor: pointer; transition: 0.3s; }
        .logo img:hover { filter: brightness(1.2); transform: scale(1.05); }

        /* --- FILTER SYSTEM --- */
        .filter-container {
            display: flex;
            gap: 25px;
        }

        .filter-item {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }

        .filter-item:hover, .filter-item.active { color: var(--text); }

        /* The White Dot Indicator from your image */
        .filter-item.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
        }

        /* --- HERO SECTION --- */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            background: radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.05), transparent);
        }

        h1 { font-size: 4rem; font-weight: 700; letter-spacing: -2px; }
        .hero-sub { color: var(--accent); font-weight: bold; letter-spacing: 3px; margin-bottom: 10px; }

        /* --- 3D RENDER & VIEWER GRID --- */
        .section-title { padding: 0 10%; margin-bottom: 30px; font-size: 1.5rem; }
        
        .render-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            grid-auto-rows: 300px;
            gap: 20px;
            padding: 0 10%;
            margin-bottom: 80px;
        }

        .render-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            background: var(--card-bg);
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* 3D Viewer Specific Styling */
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        .render-item.large { grid-row: span 2; }
        .render-item.wide { grid-column: span 2; }

        .render-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        .render-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            opacity: 0;
            transition: 0.3s;
            pointer-events: none; /* Allows interaction with 3D model underneath */
        }

        .render-item:hover .render-overlay { opacity: 1; }
        .render-item:hover img { transform: scale(1.05); }

        footer { text-align: center; padding: 100px 0; border-top: 1px solid #1a1a1a; color: var(--muted); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <img src="Logo.png" alt="Return to homepage">
        </a>

        <div class="nav-links">
            <a href="#work"></a>
        </div>
    </nav>

    <header>
        <p class="hero-sub">3D VISUALIZATION</p>
        <h1>Precision Product <br>Rendering.</h1>
    </header>

    <h2 class="section-title">Sample Objects</h2>
    
    <div class="render-grid" id="work">
        
        <div class="render-item large">

<model-viewer 
    src="backpack.glb" 
    camera-controls 
    auto-rotate 
    shadow-intensity="1" 
    touch-action="pan-y">
</model-viewer>            <div class="render-overlay">
                <h3>Interactive 3D</h3>
                <p>Click and drag to rotate</p>
            </div>
        </div>

        <div class="render-item">
            <img src="easywash-render.png" alt="Easywash Rendering">
            <div class="render-overlay">
                <h3>Easywash Series</h3>
                <p>Appliance UI Visualization</p>
            </div>
        </div>

    </div>

    <footer>
        <p>© 2026 Milvus Portfolio</p>
    </footer>

    <script>
        // Logic to move the white dot when clicking filters
        const filters = document.querySelectorAll('.filter-item');
        filters.forEach(filter => {
            filter.addEventListener('click', () => {
                filters.forEach(f => f.classList.remove('active'));
                filter.classList.add('active');
            });
        });
    </script>

</body>
</html>
